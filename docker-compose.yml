services:
  # MySQL 数据库
  db:
    image: mysql:8.0
    container_name: ecommerce_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ecommerce_db
      MYSQL_USER: ecommerce
      MYSQL_PASSWORD: ecommerce
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - ecommerce_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 180s

  # Laravel 后端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecommerce_backend
    restart: always
    working_dir: /var/www/html
    volumes:
      - backend_storage:/var/www/html/storage
      - backend_cache:/var/www/html/bootstrap/cache
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_started
    networks:
      - ecommerce_network
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=ecommerce_db
      - DB_USERNAME=root
      - DB_PASSWORD=root
      - APP_KEY=base64:U1Y0qA9qgM3g9Q3cX3uD1C1CkqQm7JxjY9cQ9n6S3m0=
      - APP_ENV=local
      - APP_DEBUG=true
      - CACHE_DRIVER=file
      - SESSION_DRIVER=file
    command: >
      sh -c "
      mkdir -p storage/framework/cache storage/framework/sessions storage/framework/views storage/logs &&
      chown -R www-data:www-data storage bootstrap/cache || true &&
      until mysqladmin ping -h"$$DB_HOST" -P"$$DB_PORT" -u"$$DB_USERNAME" -p"$$DB_PASSWORD" --skip-ssl --silent; do echo 'Waiting for database...'; sleep 3; done &&
      php artisan migrate --force &&
      php artisan db:seed --force &&
      php artisan serve --host=0.0.0.0 --port=8000
      "

  # Vue 前端
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecommerce_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - ecommerce_network

volumes:
  db_data:
  backend_storage:
  backend_cache:

networks:
  ecommerce_network:
    driver: bridge
