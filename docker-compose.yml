name: ecommerce

services:
  # MySQL 数据库
  db:
    image: mysql:8.0
    container_name: ecommerce_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ecommerce_db
      MYSQL_USER: ecommerce
      MYSQL_PASSWORD: ecommerce
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - ecommerce_network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uecommerce -pecommerce --silent || mysqladmin ping -h localhost -uroot -proot --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 120s

  # Laravel 后端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecommerce_backend
    restart: always
    working_dir: /var/www/html
    volumes:
      - backend_storage:/var/www/html/storage
      - backend_cache:/var/www/html/bootstrap/cache
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ecommerce_network
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=ecommerce_db
      - DB_USERNAME=ecommerce
      - DB_PASSWORD=ecommerce
      - APP_KEY=base64:U1Y0qA9qgM3g9Q3cX3uD1C1CkqQm7JxjY9cQ9n6S3m0=
      - APP_ENV=local
      - APP_DEBUG=true
      - CACHE_DRIVER=file
      - SESSION_DRIVER=file
    command: >
      sh -c "
      until mysqladmin ping -hdb -P3306 -uecommerce -pecommerce --skip-ssl --silent 2>/dev/null; do echo 'Waiting for database...'; sleep 2; done &&
      php artisan migrate --force &&
      php artisan db:seed --force &&
      php artisan serve --host=0.0.0.0 --port=8000
      "

  # Vue 前端
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecommerce_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - ecommerce_network

volumes:
  db_data:
  backend_storage:
  backend_cache:

networks:
  ecommerce_network:
    driver: bridge
